<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 | 黄韵锦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            background-color: #e8f1f8;  /* 更柔和的浅蓝色背景 */
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #ffffff;  /* 卡片保持白色，更有层次感 */
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.15);
        }
        
        /* 头像区域 */
        .avatar-wrapper { text-align: center; margin-bottom: 30px; }
        .avatar {
            width: 120px; height: 120px; margin: 0 auto;
            border-radius: 50%; overflow: hidden;
            border: 3px solid #3498db;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 标题区域 */
        .title-wrapper { text-align: center; margin-bottom: 15px; }
        h1 { 
            font-size: 2.8rem; 
            color: #2c3e50; 
            margin-bottom: 5px; 
            font-weight: 600;
            letter-spacing: 1px;
        }
        .subtitle { 
            text-align: center; 
            color: #3498db; 
            font-size: 1.1rem; 
            margin-bottom: 30px;
            background: linear-gradient(135deg, #e8f1f8 0%, #d4e6f1 100%);
            padding: 10px 25px;
            border-radius: 40px;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            font-weight: 500;
            border: 1px solid #bdd9ed;
        }
        
        /* 简介卡片 - 浅蓝色调 */
        .intro-card {
            background: linear-gradient(135deg, #f0f8ff 0%, #ffffff 100%);
            padding: 30px;
            margin-bottom: 35px;
            border: 1px solid #c5e0f5;
            border-radius: 20px;
            border-left: 6px solid #3498db;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.1);
        }
        .intro-text { 
            color: #2c3e50; 
            text-align: center; 
            font-size: 1.15rem;
            line-height: 1.8;
            font-weight: 400;
        }
        
        /* 导航卡片 - 浅蓝色调 */
        .nav-cards { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-bottom: 35px; 
        }
        .nav-card {
            background: linear-gradient(135deg, #f8fcff 0%, #ffffff 100%);
            padding: 30px 20px;
            text-align: center;
            border: 1px solid #c5e0f5;
            border-radius: 20px;
            border-top: 5px solid #3498db;
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.08);
            transition: all 0.2s ease;
        }
        .nav-card:hover {
            box-shadow: 0 8px 16px rgba(52, 152, 219, 0.15);
            border-color: #3498db;
            background: linear-gradient(135deg, #ffffff 0%, #f0f8ff 100%);
        }
        
        .card-icon {
            width: 60px; height: 60px; margin: 0 auto 15px;
            background: linear-gradient(135deg, #3498db, #5faee3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        .card-icon i { font-size: 26px; color: white; }
        .nav-card h3 { 
            font-size: 1.3rem; 
            margin-bottom: 8px; 
            color: #2c3e50;
            font-weight: 600;
        }
        .nav-card p { 
            font-size: 0.95rem; 
            color: #5f7d9c; 
            margin-bottom: 15px; 
            line-height: 1.5;
        }
        .card-link { 
            color: #3498db; 
            font-size: 0.95rem; 
            font-weight: 500;
            display: inline-block;
            padding: 5px 15px;
            background-color: #e8f1f8;
            border-radius: 30px;
            transition: all 0.2s ease;
        }
        .nav-card:hover .card-link {
            background-color: #3498db;
            color: white;
        }
        
        /* 联系方式 - 浅蓝色调 */
        .contact-info { 
            text-align: center; 
            margin-top: 35px; 
            padding-top: 25px; 
            border-top: 2px dashed #c5e0f5;
        }
        .email-display {
            display: inline-flex; align-items: center; gap: 10px;
            color: #2c3e50; font-size: 1rem;
            padding: 12px 30px; 
            background: linear-gradient(135deg, #e8f1f8 0%, #d4e6f1 100%);
            border: 1px solid #3498db;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.15);
        }
        .email-display i { color: #3498db; font-size: 1.2rem; }
        
        /* 装饰性波浪 - 极简点缀 */
        .wave-decoration {
            text-align: center;
            margin-top: 20px;
            color: #bdd9ed;
            font-size: 1.2rem;
            letter-spacing: 4px;
        }
        
        @media (max-width: 600px) {
            .nav-cards { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
            .container { padding: 25px 20px; }
            .subtitle { font-size: 1rem; padding: 8px 20px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 头像区域 -->
        <div class="avatar-wrapper">
            <div class="avatar">
                <img src="images/avatar.jpg" alt="头像" class="avatar-img" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#3498db;color:white;font-size:48px>黄</div>'">
            </div>
        </div>
        
        <!-- 标题 -->
        <div class="title-wrapper">
            <h1>黄韵锦</h1>
        </div>
        <p class="subtitle">✨ 热爱交流的探索者 · 数模协会成员</p>
        
        <!-- 简介卡片 -->
        <div class="intro-card">
            <p class="intro-text">大家好！我是数字媒体技术专业2025级的学生。我相信每一次思想的碰撞都能擦出新的火花，每一次交流都能带来新的视角。</p>
        </div>
        
        <!-- 导航卡片 -->
        <div class="nav-cards">
            <div class="nav-card" onclick="location.href='about.html'">
                <div class="card-icon"><i class="fas fa-user"></i></div>
                <h3>关于我</h3>
                <p>背景、兴趣与方向</p>
                <span class="card-link">了解更多 →</span>
            </div>
            <div class="nav-card" onclick="location.href='skills.html'">
                <div class="card-icon"><i class="fas fa-leaf"></i></div>
                <h3>学海拾贝</h3>
                <p>编程 · 数学 · 工具</p>
                <span class="card-link">探索 →</span>
            </div>
            <div class="nav-card" onclick="location.href='thinking.html'">
                <div class="card-icon"><i class="fas fa-lightbulb"></i></div>
                <h3>我的思考</h3>
                <p>为什么要加入讨论组</p>
                <span class="card-link">了解更多 →</span>
            </div>
        </div>
        
        <!-- 联系方式 -->
        <div class="contact-info">
            <div class="email-display">
                <i class="fas fa-envelope"></i>
                <span>553468495@qq.com</span>
            </div>
        </div>
        
        <!-- 极简装饰 -->
        <div class="wave-decoration">~~ ~~ ~~</div>
    </div>
</body>
</html>
