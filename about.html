<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 | 黄韵锦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            background-color: #f0f7fa;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .back-button {
            display: inline-block; margin-bottom: 20px;
            padding: 8px 20px; background-color: #ffffff;
            border: 1px solid #3498db; border-radius: 30px;
            text-decoration: none; color: #2c3e50;
        }
        .back-button i { color: #3498db; margin-right: 5px; }
        .content-card {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1 { 
            font-size: 2rem; 
            color: #2c3e50; 
            margin-bottom: 25px; 
            padding-bottom: 12px; 
            border-bottom: 3px solid #3498db;
        }
        .section { margin-bottom: 30px; }
        .section h2 { 
            font-size: 1.3rem; 
            margin-bottom: 12px; 
            color: #3498db;
            border-left: 4px solid #3498db; 
            padding-left: 12px; 
        }
        .section p { 
            margin-bottom: 6px; 
            color: #34495e;
            padding-left: 16px;
        }
        .styled-list { list-style: none; }
        .styled-list li { 
            padding: 6px 0 6px 30px; 
            position: relative; 
            color: #34495e;
        }
        .styled-list li::before { 
            content: "•"; 
            position: absolute; 
            left: 16px; 
            color: #3498db; 
            font-size: 1.2rem;
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .content-card { padding: 20px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i> 返回主页</a>
        <div class="content-card">
            <h1>📋 关于我</h1>
            <div class="section">
                <h2>🎓 教育背景</h2>
                <p>学校：安徽大学</p>
                <p>专业：数字媒体技术</p>
                <p>年级：2025级</p>
                <p>主修课程：程序设计基础、高等数学、线性代数、数字图像处理</p>
            </div>
            <div class="section">
                <h2>🔍 研究方向</h2>
                <p>目前对智能体特别感兴趣，正在探索相关方向。</p>
            </div>
            <div class="section">
                <h2>🌟 个人特质</h2>
                <ul class="styled-list">
                    <li>热爱学术交流，喜欢在讨论中获得新视角</li>
                    <li>善于倾听与表达，能够清晰地组织观点</li>
                    <li>保持好奇心，对跨学科话题有浓厚兴趣</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
