<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目经历 | 黄韵锦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .back-button {
            display: inline-block; margin-bottom: 20px;
            padding: 8px 16px; background-color: #f5f5f5;
            border: 1px solid #ccc; text-decoration: none; color: #000;
        }
        .content-card {
            background-color: #fff;
            padding: 30px;
            border: 1px solid #ccc;
        }
        h1 { font-size: 2rem; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #ccc; }
        .project-list { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .project-item { background-color: #f5f5f5; padding: 20px; border: 1px solid #ccc; }
        .project-header { display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; }
        .project-header h3 { font-size: 1.2rem; color: #000; }
        .project-date { color: #333; font-size: 0.85rem; background-color: #ddd; padding: 2px 8px; }
        .project-description { color: #333; margin-bottom: 10px; }
        .tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { background-color: #fff; color: #333; padding: 2px 8px; border: 1px solid #ccc; font-size: 0.8rem; }
        .section h2 { font-size: 1.2rem; margin-bottom: 15px; border-left: 3px solid #000; padding-left: 10px; }
        .skills-grid { display: flex; flex-direction: column; gap: 10px; }
        .skill-item { display: flex; align-items: center; gap: 10px; }
        .skill-item span:first-child { width: 80px; color: #000; }
        .progress-bar { flex: 1; height: 6px; background-color: #ddd; }
        .progress { height: 100%; background-color: #666; }
        @media (max-width: 600px) {
            .project-header { flex-direction: column; gap: 5px; }
            .skill-item { flex-direction: column; align-items: flex-start; }
            .progress-bar { width: 100%; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i> 返回主页</a>
        <div class="content-card">
            <h1>项目经历</h1>
            
            <div class="project-list">
                <div class="project-item">
                    <div class="project-header">
                        <h3>项目/经历一</h3>
                        <span class="project-date">2024.09 - 至今</span>
                    </div>
                    <p class="project-description">详细描述你的项目内容、你的角色、使用的技术和取得的成果。</p>
                    <div class="tags">
                        <span class="tag">技术/关键词1</span>
                        <span class="tag">技术/关键词2</span>
                    </div>
                </div>

                <div class="project-item">
                    <div class="project-header">
                        <h3>项目/经历二</h3>
                        <span class="project-date">2024.03 - 2024.08</span>
                    </div>
                    <p class="project-description">详细描述你的项目内容、你的角色、使用的技术和取得的成果。</p>
                    <div class="tags">
                        <span class="tag">技术/关键词1</span>
                        <span class="tag">技术/关键词2</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>技能栈</h2>
                <div class="skills-grid">
                    <div class="skill-item"><span>Python</span><div class="progress-bar"><div class="progress" style="width:80%"></div></div></div>
                    <div class="skill-item"><span>数据分析</span><div class="progress-bar"><div class="progress" style="width:70%"></div></div></div>
                    <div class="skill-item"><span>学术写作</span><div class="progress-bar"><div class="progress" style="width:85%"></div></div></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
