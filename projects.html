<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目经历 | 黄韵锦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            background-color: #f0f7fa;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .back-button {
            display: inline-block; margin-bottom: 20px;
            padding: 8px 20px; background-color: #ffffff;
            border: 1px solid #3498db; border-radius: 30px;
            text-decoration: none; color: #2c3e50;
        }
        .back-button i { color: #3498db; margin-right: 5px; }
        .content-card {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1 { 
            font-size: 2rem; 
            color: #2c3e50; 
            margin-bottom: 25px; 
            padding-bottom: 12px; 
            border-bottom: 3px solid #3498db;
        }
        .project-list { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .project-item { 
            background-color: #f8fafc; 
            padding: 25px; 
            border: 1px solid #e1e8ed;
            border-radius: 10px;
            border-left: 4px solid #3498db;
        }
        .project-header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            flex-wrap: wrap;
            align-items: center;
        }
        .project-header h3 { font-size: 1.2rem; color: #2c3e50; }
        .project-date { 
            color: #3498db; 
            font-size: 0.85rem; 
            background-color: #ebf5ff; 
            padding: 4px 12px; 
            border-radius: 20px;
        }
        .project-description { color: #7f8c8d; margin-bottom: 12px; line-height: 1.7; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { 
            background-color: #ebf5ff; 
            color: #3498db; 
            padding: 4px 12px; 
            border: none;
            border-radius: 20px; 
            font-size: 0.8rem; 
        }
        .section { margin-top: 30px; }
        .section h2 { 
            font-size: 1.3rem; 
            margin-bottom: 20px; 
            color: #3498db;
            border-left: 4px solid #3498db; 
            padding-left: 12px; 
        }
        .skills-grid { display: flex; flex-direction: column; gap: 15px; }
        .skill-item { 
            display: flex; 
            align-items: center; 
            gap: 15px;
            background-color: #f8fafc;
            padding: 12px 20px;
            border-radius: 8px;
        }
        .skill-item span:first-child { 
            width: 80px; 
            color: #2c3e50; 
            font-weight: 500;
        }
        .progress-bar { 
            flex: 1; 
            height: 8px; 
            background-color: #e1e8ed; 
            border-radius: 4px;
        }
        .progress { 
            height: 100%; 
            background-color: #3498db; 
            border-radius: 4px;
        }
        @media (max-width: 600px) {
            .project-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .skill-item { flex-direction: column; align-items: flex-start; }
            .progress-bar { width: 100%; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i> 返回主页</a>
        <div class="content-card">
            <h1>🚀 项目经历</h1>
            
            <div class="project-list">
                <div class="project-item">
                    <div class="project-header">
                        <h3>项目/经历一</h3>
                        <span class="project-date">2024.09 - 至今</span>
                    </div>
                    <p class="project-description">详细描述你的项目内容、你的角色、使用的技术和取得的成果。</p>
                    <div class="tags">
                        <span class="tag">技术/关键词1</span>
                        <span class="tag">技术/关键词2</span>
                    </div>
                </div>

                <div class="project-item">
                    <div class="project-header">
                        <h3>项目/经历二</h3>
                        <span class="project-date">2024.03 - 2024.08</span>
                    </div>
                    <p class="project-description">详细描述你的项目内容、你的角色、使用的技术和取得的成果。</p>
                    <div class="tags">
                        <span class="tag">技术/关键词1</span>
                        <span class="tag">技术/关键词2</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>💻 技能栈</h2>
                <div class="skills-grid">
                    <div class="skill-item"><span>Python</span><div class="progress-bar"><div class="progress" style="width:80%"></div></div></div>
                    <div class="skill-item"><span>数据分析</span><div class="progress-bar"><div class="progress" style="width:70%"></div></div></div>
                    <div class="skill-item"><span>学术写作</span><div class="progress-bar"><div class="progress" style="width:85%"></div></div></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
