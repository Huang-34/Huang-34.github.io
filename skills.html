<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学海拾贝 | 黄韵锦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-button {
            display: inline-block; margin-bottom: 20px;
            padding: 8px 16px; background-color: #f5f5f5;
            border: 1px solid #ccc; text-decoration: none; color: #000;
        }
        .content-card {
            background-color: #fff;
            padding: 30px;
            border: 1px solid #ccc;
        }
        h1 { font-size: 2rem; margin-bottom: 5px; }
        .section-subtitle { color: #333; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #ccc; }
        .category { margin-bottom: 40px; }
        .category-header { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .category-header i { color: #000; }
        .category-header h2 { font-size: 1.2rem; color: #000; }
        .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .skill-card { background-color: #f5f5f5; padding: 20px; border: 1px solid #ccc; }
        .skill-card h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .skill-level { font-size: 0.85rem; color: #333; margin-bottom: 10px; }
        .skill-desc { font-size: 0.85rem; color: #333; margin-top: 10px; }
        .progress-bar { height: 6px; background-color: #ddd; margin: 10px 0; }
        .progress { height: 100%; background-color: #666; width: 0; }
        .math-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .math-item { background-color: #f5f5f5; padding: 20px; border: 1px solid #ccc; }
        .math-item h3 { font-size: 1.1rem; margin-bottom: 10px; }
        .math-details { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .math-tag { background-color: #fff; padding: 3px 8px; border: 1px solid #ccc; font-size: 0.8rem; color: #333; }
        .interest-level i { color: #333; }
        .tools-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tool-item { background-color: #f5f5f5; padding: 10px; display: flex; align-items: center; gap: 8px; border: 1px solid #ccc; }
        .tool-icon { color: #000; }
        .learning-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .learning-tag { background-color: #f5f5f5; padding: 6px 12px; border: 1px solid #ccc; color: #333; }
        .quote-card { background-color: #f5f5f5; padding: 20px; margin-top: 20px; border: 1px solid #ccc; }
        .quote-card i { color: #333; margin-bottom: 5px; display: block; }
        .quote-card p { color: #333; font-style: italic; }
        @media (max-width: 600px) {
            .skills-grid, .math-grid, .tools-grid { grid-template-columns: 1fr; }
            .content-card { padding: 20px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i> 返回主页</a>
        <div class="content-card">
            <h1>学海拾贝</h1>
            <p class="section-subtitle">大一数字媒体技术专业 · 正在构建的知识体系</p>
            
            <div class="category">
                <div class="category-header"><i class="fas fa-code"></i><h2>编程与开发</h2></div>
                <div class="skills-grid">
                    <div class="skill-card">
                        <h3>Python</h3>
                        <div class="skill-level">学习中</div>
                        <div class="progress-bar"><div class="progress" style="width:65%"></div></div>
                        <p class="skill-desc">基础语法、turtle绘图、简单的数据处理</p>
                    </div>
                    <div class="skill-card">
                        <h3>C语言</h3>
                        <div class="skill-level">学习中</div>
                        <div class="progress-bar"><div class="progress" style="width:55%"></div></div>
                        <p class="skill-desc">学习中</p>
                    </div>
                </div>
            </div>

            <div class="category">
                <div class="category-header"><i class="fas fa-square-root-alt"></i><h2>数理基础</h2></div>
                <div class="math-grid">
                    <div class="math-item">
                        <h3>高等数学</h3>
                        <div class="math-details">
                            <span class="math-tag">极限与连续</span>
                            <span class="math-tag">导数与微分</span>
                            <span class="math-tag">积分初步</span>
                        </div>
                        <div class="interest-level"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i></div>
                    </div>
                    <div class="math-item">
                        <h3>线性代数</h3>
                        <div class="math-details">
                            <span class="math-tag">矩阵运算</span>
                            <span class="math-tag">向量空间</span>
                            <span class="math-tag">线性变换</span>
                        </div>
                        <div class="interest-level"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i></div>
                    </div>
                </div>
            </div>

            <div class="category">
                <div class="category-header"><i class="fas fa-paint-brush"></i><h2>创意工具</h2></div>
                <div class="tools-grid">
                    <div class="tool-item"><i class="fas fa-file-word tool-icon"></i><span>Word</span></div>
                    <div class="tool-item"><i class="fas fa-file-excel tool-icon"></i><span>Excel</span></div>
                    <div class="tool-item"><i class="fas fa-file-powerpoint tool-icon"></i><span>PPT</span></div>
                    <div class="tool-item"><i class="fas fa-paint-brush tool-icon"></i><span>Photoshop</span></div>
                    <div class="tool-item"><i class="fas fa-video tool-icon"></i><span>剪映/PR</span></div>
                    <div class="tool-item"><i class="fas fa-pen-fancy tool-icon"></i><span>Procreate</span></div>
                </div>
            </div>

            <div class="category">
                <div class="category-header"><i class="fas fa-seedling"></i><h2>正在探索的领域</h2></div>
                <div class="learning-grid">
                    <span class="learning-tag">三维建模入门</span>
                    <span class="learning-tag">用户体验设计</span>
                </div>
            </div>

            <div class="quote-card">
                <i class="fas fa-quote-left"></i>
                <p>作为数媒专业的大一学生，我正在努力构建"技术+艺术"的知识体系。</p>
            </div>
        </div>
    </div>
</body>
</html>
